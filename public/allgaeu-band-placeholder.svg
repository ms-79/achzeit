<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Allgaeu Berglandschaft (Platzhalter)">
  <!-- PLATZHALTER: stilisierte Allgaeu-Landschaft. Spaeter durch echtes/KI-Foto ersetzen,
       indem diese Datei ueberschrieben oder WELCOME_BAND_IMAGE in src/constants/site.ts angepasst wird. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9e0cf"/>
      <stop offset="45%" stop-color="#dcc9a6"/>
      <stop offset="100%" stop-color="#cdbf9f"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ead6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f4ead6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sun" cx="72%" cy="30%" r="22%">
      <stop offset="0%" stop-color="#f7e8c4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f7e8c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="1600" height="600" fill="url(#sky)"/>
  <circle cx="1150" cy="180" r="320" fill="url(#sun)"/>

  <!-- far mountain ridge -->
  <path d="M0 320 L180 250 L320 300 L460 210 L620 290 L780 200 L960 285 L1140 215 L1320 295 L1480 240 L1600 300 L1600 600 L0 600 Z"
        fill="#6f8278" opacity="0.55"/>
  <!-- mid ridge -->
  <path d="M0 380 L160 320 L300 370 L470 290 L640 360 L820 300 L1000 365 L1180 305 L1360 370 L1520 320 L1600 360 L1600 600 L0 600 Z"
        fill="#4e6358" opacity="0.8"/>
  <!-- snow caps on mid ridge -->
  <path d="M470 290 L500 315 L455 315 Z M820 300 L852 326 L800 326 Z M1180 305 L1212 331 L1160 331 Z" fill="#f4eedd" opacity="0.9"/>

  <!-- atmospheric haze over valley -->
  <rect y="330" width="1600" height="160" fill="url(#haze)"/>

  <!-- near hills / meadow -->
  <path d="M0 450 L260 405 L520 455 L820 410 L1120 460 L1380 415 L1600 455 L1600 600 L0 600 Z"
        fill="#3a5145"/>
  <path d="M0 510 L300 480 L640 515 L980 478 L1320 515 L1600 490 L1600 600 L0 600 Z"
        fill="#2e4135"/>

  <!-- a few simple pine silhouettes -->
  <g fill="#243528">
    <path d="M210 470 l16 34 l-32 0 Z M210 452 l13 28 l-26 0 Z"/>
    <path d="M1380 478 l18 38 l-36 0 Z M1380 458 l14 30 l-28 0 Z"/>
    <path d="M760 486 l14 30 l-28 0 Z"/>
  </g>
</svg>
